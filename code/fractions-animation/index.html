<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixed Numbers to Improper Fractions</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- KaTeX for Math Formatting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="animation-stage">
      
      <!-- Scene 1: Intro -->
      <div id="scene1" class="scene">
        <h1 class="main-title">P4 Math:<br>Mixed Numbers ➡️ Improper Fractions</h1>
      </div>

      <!-- Scene 2: Concrete -->
      <div id="scene2" class="scene hidden">
        <div class="pizzas-container">
            <div class="pizza whole-pizza">
                <div class="slice left"></div>
                <div class="slice right"></div>
            </div>
            <div class="pizza half-pizza">
                <div class="slice right"></div>
            </div>
        </div>
        <div class="scene-text en-text">I have 1 Whole and 1/2 Pizza.</div>
        <div class="scene-math">$$1\frac{1}{2}$$</div>
      </div>

      <!-- Scene 3: Pictorial -->
      <div id="scene3" class="scene hidden">
        <div class="bars-container">
            <div class="bar-group" id="whole-bar-group">
                <div class="bar whole-bar"></div>
            </div>
            <div class="bar-group" id="half-bar-group">
                <div class="bar half-bar"></div>
            </div>
        </div>
        <div class="scene-text en-text" id="scene3-text">1 Whole = 2 halves. Total halves = 3.</div>
      </div>

      <!-- Scene 4: Abstract -->
      <div id="scene4" class="scene hidden">
        <!-- Step-by-step chain equation -->
        <div class="equation-chain">
          <span class="eq-part" id="calc-step1">$$1\frac{1}{2}$$</span>
          <span class="eq-part" id="calc-step2">$$= 1 + \frac{1}{2}$$</span>
          <span class="eq-part" id="calc-step3">$$= \frac{2}{2} + \frac{1}{2}$$</span>
          <span class="eq-part" id="calc-step4">$$= \frac{3}{2}$$</span>
        </div>
        <!-- Final big result -->
        <div class="final-math">$$1\frac{1}{2} = \frac{3}{2}$$</div>
      </div>

      <!-- Scene 5: Summary -->
      <div id="scene5" class="scene hidden">
        <div class="logo-placeholder">📐 Math Mastery</div>
        <h2 class="slogan">看懂模型图，数学变简单。</h2>
      </div>

    </div>

    <!-- Subtitle Area -->
    <div class="subtitle-container">
        <div id="subtitle-text" class="cn-text"></div>
    </div>
    
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <!-- Progress bar + scene indicator -->
  <div class="progress-area">
      <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
          <!-- Scene markers -->
          <div class="scene-marker" style="left: 8.3%;" title="Scene 1"></div>
          <div class="scene-marker" style="left: 33.3%;" title="Scene 2"></div>
          <div class="scene-marker" style="left: 66.6%;" title="Scene 3"></div>
          <div class="scene-marker" style="left: 91.6%;" title="Scene 4"></div>
      </div>
      <div class="progress-info">
          <span id="sceneLabel" class="scene-label">准备开始</span>
          <span id="countdownLabel" class="countdown-label"></span>
      </div>
  </div>

  <!-- Controls (outside app-container to avoid overlap) -->
  <div class="controls">
      <button id="homeBtn" onclick="window.location.href='../index.html'">🏠 首页</button>
      <button id="playBtn">▶ Play</button>
      <button id="pauseBtn">⏸ Pause</button>
      <button id="restartBtn">↻ Restart</button>
  </div>

  <script src="../speed-insights.js"></script>
  <script src="script.js"></script>
  <script>
    // Render all static KaTeX math after page loads
    document.addEventListener("DOMContentLoaded", () => {
      renderMathInElement(document.body, {
        delimiters: [
          {left: "$$", right: "$$", display: true},
          {left: "$", right: "$", display: false}
        ]
      });
    });
  </script>
</body>
</html>
